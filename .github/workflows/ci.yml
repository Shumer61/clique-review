name: CI – TypeScript build check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build check
        run: npm run build